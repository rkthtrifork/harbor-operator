    controller-gen.kubebuilder.io/version: v0.20.1
  name: members.harbor.harbor-operator.io
spec:
  group: harbor.harbor-operator.io
  names:
    categories:
    - harbor
    kind: Member
    listKind: MemberList
    plural: members
    singular: member
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.projectRef
      name: Project
      type: string
    - jsonPath: .spec.memberUser.username
      name: User
      type: string
    - jsonPath: .spec.memberGroup.group_name
      name: Group
      type: string
    - jsonPath: .spec.role
      name: Role
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].reason
      name: Reason
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].message
      name: Message
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Member is the Schema for the members API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MemberSpec defines the desired state of Member.
            properties:
              allowTakeover:
                description: |-
                  AllowTakeover indicates whether the operator is allowed to adopt an
                  existing project membership in Harbor for the same identity.
                type: boolean
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy controls what happens when the Kubernetes object is deleted.
                  Delete removes the corresponding Harbor resource before removing the finalizer.
                  Orphan removes the finalizer even if Harbor cleanup cannot be completed.
                enum:
                - Delete
                - Orphan
                type: string
              driftDetectionInterval:
                description: |-
                  DriftDetectionInterval is the interval at which the operator will check
                  for drift. A value of 0 (or omitted) disables periodic drift detection.
                type: string
              harborConnectionRef:
                description: HarborConnectionRef references the Harbor connection
                  object to use.
                properties:
                  kind:
                    default: HarborConnection
                    description: |-
                      Kind selects the Harbor connection object kind.
                      Defaults to HarborConnection.
                    enum:
                    - HarborConnection
                    - ClusterHarborConnection
                    type: string
                  name:
                    description: Name of the referenced Harbor connection object.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              memberGroup:
                description: MemberGroup defines the member if it is a group.
                properties:
                  group_name:
                    description: GroupName is the name of the group.
                    type: string
                  group_type:
                    description: GroupType is the type of the group.
                    type: integer
                  ldap_group_dn:
                    description: LDAPGroupDN is used for LDAP groups.
                    type: string
                type: object
              memberUser:
                description: MemberUser defines the member if it is a user.
                properties:
                  username:
                    description: Username is used to onboard a user if not already
                      present.
                    type: string
                type: object
              projectRef:
                description: ProjectRef is the name (or ID) of the project in Harbor
                  where the member should be added.
                type: string
              reconcileNonce:
                description: ReconcileNonce forces an immediate reconcile when updated.
                type: string
              role:
                description: |-
                  Role is the human‑readable name of the role.
                  Allowed values: "admin", "maintainer", "developer", "guest"
                enum:
                - admin
                - maintainer
                - developer
                - guest
                type: string
            required:
            - harborConnectionRef
            - projectRef
            - role
            type: object
            x-kubernetes-validations:
            - message: exactly one of memberUser or memberGroup must be set
              rule: has(self.memberUser) != has(self.memberGroup)
            - message: memberUser.username must be set when memberUser is provided
              rule: '!has(self.memberUser) || size(self.memberUser.username) > 0'
            - message: memberGroup must specify group_name or ldap_group_dn
              rule: '!has(self.memberGroup) || size(self.memberGroup.group_name) >
                0 || size(self.memberGroup.ldap_group_dn) > 0'
          status:
