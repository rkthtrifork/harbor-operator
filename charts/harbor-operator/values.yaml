image:
  repository: ghcr.io/rkthtrifork/harbor-operator/harbor-operator
  # If set, digest takes precedence over tag.
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

replicaCount: 1

metrics:
  enabled: false
  secure: true
  bindAddress: ":8443"
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceAccount:
  create: true
  # If empty and create=true, the chart fullname is used.
  name: ""

podAnnotations: {}
podLabels: {}
priorityClassName: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - "ALL"

env: []

pdb:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

nodeSelector: {}
tolerations: []
affinity: {}

topologySpreadConstraints: []

networkPolicy:
  enabled: false
  # type controls which policy kind is rendered when enabled.
  type: kubernetes # kubernetes | cilium
  ingress:
    metrics:
      enabled: true
      # Namespaces allowed to scrape metrics (ingress).
      namespaces: []
      # - monitoring
  egress:
    # Egress to kube-apiserver (TCP 443).
    allowKubeAPI: true
    # kube-apiserver ports to allow when allowKubeAPI is true.
    kubeAPIPorts:
      - 443
    # Egress to kube-dns (UDP/TCP 53).
    allowDNS: true
    harborSelectors: []
    # - namespaceSelector:
    #     matchLabels:
    #       name: harbor-system
    #   podSelector:
    #     matchLabels:
    #       app.kubernetes.io/component: core
    #       app.kubernetes.io/instance: harbor
    # - namespace: default
    #   podSelector:
    #     matchLabels:
    #       app.kubernetes.io/component: core
    #       app.kubernetes.io/instance: harbor
