{{- if and .Values.metrics.enabled .Values.metrics.secure -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "harbor-operator.fullname" . }}-metrics-auth-reader
  namespace: kube-system
  labels:
{{ include "harbor-operator.labels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "harbor-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end -}}
