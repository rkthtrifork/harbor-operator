apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "harbor-operator.fullname" . }}-manager-role
  labels:
{{ include "harbor-operator.labels" . | indent 4 }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create","get","list","patch","update","watch"]
- apiGroups: ["harbor.harbor-operator.io"]
  resources: ["configurations","gcschedules","harborconnections","members","projects","purgeauditschedules","registries","retentionpolicies","robots","users"]
  verbs: ["create","delete","get","list","patch","update","watch"]
- apiGroups: ["harbor.harbor-operator.io"]
  resources: ["configurations/finalizers","gcschedules/finalizers","harborconnections/finalizers","members/finalizers","projects/finalizers","purgeauditschedules/finalizers","registries/finalizers","retentionpolicies/finalizers","robots/finalizers","users/finalizers"]
  verbs: ["update"]
- apiGroups: ["harbor.harbor-operator.io"]
  resources: ["configurations/status","gcschedules/status","harborconnections/status","members/status","projects/status","purgeauditschedules/status","registries/status","retentionpolicies/status","robots/status","users/status"]
  verbs: ["get","patch","update"]
