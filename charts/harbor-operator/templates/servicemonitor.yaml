{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "harbor-operator.fullname" . }}
  namespace: {{ default .Release.Namespace .Values.metrics.serviceMonitor.namespace }}
  labels:
{{ include "harbor-operator.labels" . | indent 4 }}
{{- if .Values.metrics.serviceMonitor.labels }}
{{ toYaml .Values.metrics.serviceMonitor.labels | nindent 4 }}
{{- end }}
{{- if .Values.metrics.serviceMonitor.annotations }}
  annotations:
{{ toYaml .Values.metrics.serviceMonitor.annotations | nindent 4 }}
{{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "harbor-operator.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: metrics
  endpoints:
    - port: {{ ternary "https" "http" .Values.metrics.secure }}
      path: /metrics
      scheme: {{ ternary "https" "http" .Values.metrics.secure }}
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout }}
      honorLabels: {{ .Values.metrics.serviceMonitor.honorLabels }}
      {{- if .Values.metrics.secure }}
      {{- if .Values.metrics.serviceMonitor.bearerTokenFile }}
      bearerTokenFile: {{ .Values.metrics.serviceMonitor.bearerTokenFile }}
      {{- end }}
      {{- $tlsConfig := deepCopy .Values.metrics.serviceMonitor.tlsConfig }}
      {{- if and (not (get $tlsConfig "insecureSkipVerify")) (not (hasKey $tlsConfig "serverName")) }}
      {{- $_ := set $tlsConfig "serverName" (printf "%s-metrics.%s.svc" (include "harbor-operator.fullname" .) .Release.Namespace) }}
      {{- end }}
      tlsConfig:
{{ toYaml $tlsConfig | nindent 8 }}
      {{- end }}
      {{- with .Values.metrics.serviceMonitor.relabelings }}
      relabelings:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.metrics.serviceMonitor.metricRelabelings }}
      metricRelabelings:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.metrics.serviceMonitor.endpointAdditionalProperties }}
{{ toYaml . | nindent 6 }}
      {{- end }}
{{- end }}
