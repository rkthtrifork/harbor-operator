{{- if and .Values.metrics.enabled .Values.metrics.secure -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "harbor-operator.fullname" . }}-metrics-auth
  labels:
{{ include "harbor-operator.labels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "harbor-operator.fullname" . }}-metrics-auth
subjects:
  - kind: ServiceAccount
    name: {{ include "harbor-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
