name: Verify Generated Assets

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify-generated:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Set up Go
        uses: actions/setup-go@v6.0.0
        with:
          go-version-file: "go.mod"

      - name: Regenerate code and synced chart assets
        run: make manifests generate sync-chart

      - name: Check for uncommitted changes
        run: |
          git status --short
          if ! git diff --quiet; then
            echo "ERROR: Running 'make manifests generate sync-chart' produced changes."
            echo "Please run 'make manifests generate sync-chart' locally and commit the results."
            exit 1
          fi
