name: Verify Generated Assets

on:
  pull_request:
    branches:
      - main
      - 'release/v*'
  push:
    branches:
      - 'release/v*'
  workflow_dispatch:

concurrency:
  group: verify-generated-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-generated:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"

      - name: Regenerate code, synced chart assets, and API reference docs
        run: make manifests generate sync-chart generate-docs

      - name: Check for uncommitted changes
        run: |
          git status --short
          if ! git diff --quiet; then
            echo "ERROR: Running 'make manifests generate sync-chart generate-docs' produced changes."
            echo "Please run 'make manifests generate sync-chart generate-docs' locally and commit the results."
            exit 1
          fi
