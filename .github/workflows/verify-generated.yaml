name: Verify Generated Assets

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: verify-generated-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-generated:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Regenerate code, synced chart assets, and API reference docs
        run: make manifests generate sync-chart generate-docs

      - name: Check for uncommitted changes
        run: |
          git status --short
          if ! git diff --quiet; then
            echo "ERROR: Running 'make manifests generate sync-chart generate-docs' produced changes."
            echo "Please run 'make manifests generate sync-chart generate-docs' locally and commit the results."
            exit 1
          fi
