name: Verify Generated Assets

on:
  pull_request:
    branches:
      - main
      - 'release/v*'
  push:
    branches:
      - 'release/v*'
  workflow_dispatch:

concurrency:
  group: verify-generated-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-generated:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"

      - name: Regenerate code, synced chart assets, and API reference docs
        run: make manifests generate sync-chart generate-docs

      - name: Check for uncommitted changes
        run: |
          git status --short
          if ! git diff --quiet; then
            echo "ERROR: Running 'make manifests generate sync-chart generate-docs' produced changes."
            echo "Please run 'make manifests generate sync-chart generate-docs' locally and commit the results."
            exit 1
          fi
