name: Release Helm Chart (OCI)

on:
  push:
    tags:
      - "chart-v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.1

      - name: Lint chart
        run: helm lint charts/harbor-operator

      - name: Verify chart version matches tag
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#chart-}"
          version="${version#v}"
          chart_version="$(grep -E '^version:' charts/harbor-operator/Chart.yaml | awk '{print $2}')"
          if [ "$version" != "$chart_version" ]; then
            echo "Tag version ($version) does not match Chart.yaml version ($chart_version)"
            exit 1
          fi

      - name: Package chart
        run: helm package charts/harbor-operator --destination dist

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart
        run: |
          chart_version="$(grep -E '^version:' charts/harbor-operator/Chart.yaml | awk '{print $2}')"
          helm push "dist/harbor-operator-${chart_version}.tgz" oci://ghcr.io/rkthtrifork/charts

      - name: Classify tag
        id: classify
        uses: ./.github/actions/classify-tag
        with:
          prefix: "chart-v"

      - name: Create GitHub Release
        if: ${{ steps.classify.outputs.is_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ steps.classify.outputs.is_rc == 'true' }}
          files: |
            dist/harbor-operator-*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
