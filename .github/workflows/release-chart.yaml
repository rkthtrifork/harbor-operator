name: Release Helm Chart (OCI)

on:
  push:
    tags:
      - "chart-v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Lint chart
        run: helm lint charts/harbor-operator

      - name: Resolve chart release metadata
        id: chart_meta
        run: |
          tag="${GITHUB_REF_NAME}"
          chart_version="${tag#chart-v}"
          operator_tag="$(git tag --points-at HEAD --list 'v*' --sort=-version:refname | head -n1)"
          if [ -n "$operator_tag" ]; then
            operator_version="${operator_tag#v}"
          else
            operator_version="$(grep -E '^appVersion:' charts/harbor-operator/Chart.yaml | sed -E 's/^appVersion:[[:space:]]*"?(.*)"?/\1/')"
          fi

          echo "chart_version=$chart_version" >> "$GITHUB_OUTPUT"
          echo "operator_version=$operator_version" >> "$GITHUB_OUTPUT"

      - name: Verify operator image exists
        env:
          OPERATOR_IMAGE: ghcr.io/${{ github.repository }}
          OPERATOR_VERSION: ${{ steps.chart_meta.outputs.operator_version }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

          for attempt in $(seq 1 30); do
            if docker manifest inspect "${OPERATOR_IMAGE}:${OPERATOR_VERSION}" >/dev/null 2>&1; then
              exit 0
            fi

            echo "Waiting for operator image ${OPERATOR_IMAGE}:${OPERATOR_VERSION} (${attempt}/30)"
            sleep 15
          done

          echo "Operator image ${OPERATOR_IMAGE}:${OPERATOR_VERSION} was not found in GHCR" >&2
          exit 1

      - name: Package chart
        run: |
          helm package charts/harbor-operator \
            --version "${{ steps.chart_meta.outputs.chart_version }}" \
            --app-version "${{ steps.chart_meta.outputs.operator_version }}" \
            --destination dist

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart
        run: helm push "dist/harbor-operator-${{ steps.chart_meta.outputs.chart_version }}.tgz" oci://ghcr.io/rkthtrifork/charts

      - name: Classify tag
        id: classify
        uses: ./.github/actions/classify-tag
        with:
          prefix: "chart-v"

      - name: Resolve release notes start tag
        if: ${{ steps.classify.outputs.is_release == 'true' }}
        id: notes
        run: |
          previous_in_series() {
            local target="$1"
            local pattern="$2"
            local regex="$3"

            {
              git tag --list "$pattern" | grep -E "$regex" || true
              echo "$target"
            } | sort -V | awk -v target="$target" '
              $0 == target { print prev; found = 1; exit }
              { prev = $0 }
              END {
                if (!found && prev != target) {
                  print prev
                }
              }
            '
          }

          current_tag="${GITHUB_REF_NAME}"

          if [ "${{ steps.classify.outputs.is_rc }}" = "true" ]; then
            version="${current_tag#chart-v}"
            base_version="${version%%-rc.*}"
            release_line="$(printf '%s' "${base_version}" | cut -d. -f1-2)"
            previous_tag="$(
              previous_in_series "chart-v${base_version}" "chart-v${release_line}.*" "^chart-v${release_line}\.[0-9]+$"
            )"

            if [ -z "$previous_tag" ]; then
              previous_tag="$(previous_in_series "chart-v${base_version}" 'chart-v*' '^chart-v[0-9]+\.[0-9]+\.[0-9]+$')"
            fi
          else
            previous_tag="$(previous_in_series "${current_tag}" 'chart-v*' '^chart-v[0-9]+\.[0-9]+\.[0-9]+$')"
          fi

          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: ${{ steps.classify.outputs.is_release == 'true' }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ github.ref_name }}
          previous_tag: ${{ steps.notes.outputs.previous_tag }}
          generate_release_notes: true
          make_latest: false
          prerelease: ${{ steps.classify.outputs.is_rc == 'true' }}
          files: |
            dist/harbor-operator-${{ steps.chart_meta.outputs.chart_version }}.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
