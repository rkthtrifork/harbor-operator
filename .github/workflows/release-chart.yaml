name: Release Helm Chart (OCI)

on:
  push:
    tags:
      - "chart-v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.1

      - name: Lint chart
        run: helm lint charts/harbor-operator

      - name: Resolve chart release metadata
        run: |
          tag="${GITHUB_REF_NAME}"
          chart_version="${tag#chart-v}"
          operator_tag="$(git tag --points-at HEAD --list 'v*' --sort=-version:refname | head -n1)"
          if [ -n "$operator_tag" ]; then
            operator_version="${operator_tag#v}"
          else
            operator_version="$(grep -E '^appVersion:' charts/harbor-operator/Chart.yaml | sed -E 's/^appVersion:[[:space:]]*"?(.*)"?/\1/')"
          fi

          echo "CHART_VERSION=$chart_version" >> "$GITHUB_ENV"
          echo "OPERATOR_VERSION=$operator_version" >> "$GITHUB_ENV"

      - name: Package chart
        run: |
          helm package charts/harbor-operator \
            --version "$CHART_VERSION" \
            --app-version "$OPERATOR_VERSION" \
            --destination dist

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart
        run: helm push "dist/harbor-operator-${CHART_VERSION}.tgz" oci://ghcr.io/rkthtrifork/charts

      - name: Classify tag
        id: classify
        uses: ./.github/actions/classify-tag
        with:
          prefix: "chart-v"

      - name: Create GitHub Release
        if: ${{ steps.classify.outputs.is_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ steps.classify.outputs.is_rc == 'true' }}
          files: |
            dist/harbor-operator-${{ env.CHART_VERSION }}.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
