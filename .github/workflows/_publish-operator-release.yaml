name: Publish Operator Release

on:
  workflow_call:
    inputs:
      version:
        description: Operator version without the leading v.
        required: true
        type: string
      ref:
        description: Git ref to check out for the release.
        required: true
        type: string
      tag_name:
        description: Operator release tag.
        required: true
        type: string
      prerelease:
        description: Whether the GitHub Release is a prerelease.
        required: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Resolve image tags
        id: image_tags
        env:
          VERSION: ${{ inputs.version }}
          TAG_NAME: ${{ inputs.tag_name }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          PRERELEASE: ${{ inputs.prerelease && 'true' || 'false' }}
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${VERSION}"
            echo "${IMAGE}:${TAG_NAME}"
            if [ "$PRERELEASE" != "true" ]; then
              echo "${IMAGE}:$(printf '%s' "$VERSION" | cut -d. -f1-2)"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image_tags.outputs.tags }}

      - name: Decide latest release flag
        id: latest
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          PRERELEASE: ${{ inputs.prerelease && 'true' || 'false' }}
        run: |
          if [ "$PRERELEASE" = "true" ]; then
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          highest_tag="$(
            {
              git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true
            } | sort -V | tail -n1
          )"

          if [ "$TAG_NAME" = "$highest_tag" ]; then
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release notes start tag
        id: notes
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          PRERELEASE: ${{ inputs.prerelease && 'true' || 'false' }}
        run: |
          previous_in_series() {
            local target="$1"
            local pattern="$2"
            local regex="$3"

            {
              git tag --list "$pattern" | grep -E "$regex" || true
              echo "$target"
            } | sort -V | awk -v target="$target" '
              $0 == target { print prev; found = 1; exit }
              { prev = $0 }
              END {
                if (!found && prev != target) {
                  print prev
                }
              }
            '
          }

          if [ "$PRERELEASE" = "true" ]; then
            version="${TAG_NAME#v}"
            base_version="${version%%-rc.*}"
            release_line="$(printf '%s' "${base_version}" | cut -d. -f1-2)"
            previous_tag="$(
              previous_in_series "v${base_version}" "v${release_line}.*" "^v${release_line}\.[0-9]+$"
            )"

            if [ -z "$previous_tag" ]; then
              previous_tag="$(previous_in_series "v${base_version}" 'v*' '^v[0-9]+\.[0-9]+\.[0-9]+$')"
            fi
          else
            previous_tag="$(previous_in_series "${TAG_NAME}" 'v*' '^v[0-9]+\.[0-9]+\.[0-9]+$')"
          fi

          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ inputs.tag_name }}
          previous_tag: ${{ steps.notes.outputs.previous_tag }}
          generate_release_notes: true
          make_latest: ${{ steps.latest.outputs.make_latest }}
          prerelease: ${{ inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
