name: Docs

on:
  pull_request:
    branches:
      - main
      - 'release/v*'
  push:
    branches: [main]
    paths:
      - "api/**"
      - "docs/**"
      - "hack/crd-ref-docs.yaml"
      - "hack/mkdocs.yml"
      - "Makefile"
      - ".github/workflows/docs.yaml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect docs-relevant changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            api_reference:
              - 'api/**'
              - 'docs/reference/api.md'
              - 'hack/crd-ref-docs.yaml'
              - 'Makefile'
            docs_site:
              - 'api/**'
              - 'docs/**'
              - 'hack/mkdocs.yml'
              - 'Makefile'
              - '.github/workflows/docs.yaml'

      - name: Set up Go
        if: github.event_name != 'pull_request' || steps.changes.outputs.api_reference == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Generate API reference
        if: github.event_name != 'pull_request' || steps.changes.outputs.api_reference == 'true'
        run: make generate-docs

      - name: Build docs site
        if: github.event_name != 'pull_request' || steps.changes.outputs.docs_site == 'true'
        run: make docs-site-build

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
