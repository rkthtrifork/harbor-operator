name: E2E Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect e2e-relevant changes
        id: changes
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        with:
          filters: |
            e2e:
              - 'api/**'
              - 'charts/**'
              - 'cmd/**'
              - 'config/**'
              - 'hack/**'
              - 'internal/**'
              - 'test/**'
              - '.dockerignore'
              - 'Dockerfile'
              - 'Makefile'
              - 'PROJECT'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/test-e2e.yaml'

      - name: Setup Go
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.e2e == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install the latest version of kind
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.e2e == 'true'
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install Helm
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.e2e == 'true'
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Verify kind installation
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.e2e == 'true'
        run: kind version

      - name: Create local Harbor stack
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.e2e == 'true'
        run: make kind-up

      - name: Running Test e2e
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.e2e == 'true'
        run: |
          kubectl port-forward -n default svc/harbor-core 8088:80 >/tmp/harbor-port-forward.log 2>&1 &
          export HARBOR_BASE_URL=http://127.0.0.1:8088
          export HARBOR_IN_CLUSTER_BASE_URL=http://harbor-core.default.svc
          export HARBOR_ADMIN_USER=admin
          export HARBOR_ADMIN_PASSWORD="$(kubectl get secret -n default harbor-core -o jsonpath='{.data.HARBOR_ADMIN_PASSWORD}' | base64 -d)"
          make test-e2e
