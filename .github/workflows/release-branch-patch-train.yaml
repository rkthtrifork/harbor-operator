name: Release Branch Patch Train

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      release_branch:
        description: Optional release branch to process, e.g. release/v0.5
        required: false
        type: string
      dry_run:
        description: Evaluate eligibility without creating tags
        required: false
        default: false
        type: boolean

concurrency:
  group: release-branch-patch-train
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    outputs:
      operator_matrix: ${{ steps.patch-train.outputs.operator_matrix }}
      chart_matrix: ${{ steps.patch-train.outputs.chart_matrix }}
      has_operator_releases: ${{ steps.patch-train.outputs.has_operator_releases }}
      has_chart_releases: ${{ steps.patch-train.outputs.has_chart_releases }}
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Create patch releases when runtime dependency files changed on release branches
        id: patch-train
        env:
          RELEASE_BRANCH: ${{ inputs.release_branch }}
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
        run: bash hack/release-branch-patch-train.sh

  publish-operator:
    needs: prepare
    if: ${{ needs.prepare.outputs.has_operator_releases == 'true' && !inputs.dry_run }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.operator_matrix) }}
    uses: ./.github/workflows/_publish-operator-release.yaml
    with:
      version: ${{ matrix.version }}
      ref: ${{ matrix.ref }}
      tag_name: ${{ matrix.tag }}
      prerelease: false
    secrets: inherit
    permissions:
      packages: write
      contents: write

  publish-chart:
    needs:
      - prepare
      - publish-operator
    if: ${{ always() && needs.prepare.outputs.has_chart_releases == 'true' && !inputs.dry_run && (needs.publish-operator.result == 'success' || needs.publish-operator.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.chart_matrix) }}
    uses: ./.github/workflows/_publish-chart-release.yaml
    with:
      version: ${{ matrix.version }}
      operator_version: ${{ matrix.operator_version }}
      ref: ${{ matrix.ref }}
      tag_name: ${{ matrix.tag }}
      prerelease: false
    secrets: inherit
    permissions:
      packages: write
      contents: write
